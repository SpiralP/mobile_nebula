name: Merge upstream

on:
  schedule:
    - cron: "0 19 * * 1" # monday at noon
  workflow_dispatch:

concurrency:
  group: merge-upstream-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  merge_upstream:
    uses: SpiralP/github-reusable-workflows/.github/workflows/merge-upstream.yml@57f3e577827d04134c3d9f2410c8c85768472ec6 # main
    with:
      url: https://github.com/DefinedNet/mobile_nebula.git
